<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chamber Membership Application</title>
    <link rel="stylesheet" href="styles.css"> <!-- Link to your stylesheet -->
    <script src="script.js" defer></script> <!-- Link to your JS for modals and animations -->
</head>

<body>
    <header>
        <h1>Join the Chamber of Commerce</h1>
    </header>

    <nav>
        <!-- Your navigation menu here -->
    </nav>

    <main>
        <h2>Fill Out the Membership Application</h2>

        <form action="thankyou.html" method="get">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" name="first-name" required autocomplete="given-name">

            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" name="last-name" required autocomplete="family-name">

            <label for="organization-title">Organizational Title</label>
            <input type="text" id="organization-title" name="organization-title" pattern="[A-Za-z\s\-]{7,}" required
                autocomplete="organization-title">

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required autocomplete="email" placeholder="example@domain.com">

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" required autocomplete="tel">

            <label for="business-name">Business Name</label>
            <input type="text" id="business-name" name="business-name" required autocomplete="organization">

            <label for="membership-level">Membership Level</label>
            <select name="membership-level" id="membership-level" required>
                <option value="NP">NP Membership (No Fee)</option>
                <option value="Bronze">Bronze Membership</option>
                <option value="Silver">Silver Membership</option>
                <option value="Gold">Gold Membership</option>
            </select>

            <label for="business-description">Business Description</label>
            <textarea name="business-description" id="business-description" required></textarea>

            <input type="hidden" name="timestamp" id="timestamp" value="2025-03-29T00:00:00">

            <button type="submit">Submit Application</button>
        </form>

        <div class="membership-cards">
            <!-- Membership level cards here with links to modals -->
        </div>
    </main>

    <footer>
        <p>&copy; 2025 Chamber of Commerce</p>
    </footer>

</body>

</html>
